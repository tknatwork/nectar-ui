name: Feature Request
description: Suggest a new component, variant, or token
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      placeholder: What component, variant, or token would you like added?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      placeholder: How would this be used? Include code examples if possible.
    validations:
      required: true
